<!-- Token Usage Chart Component -->
<!-- Hand-rolled inline SVG stacked-bar timeline of per-response token usage. -->
<!-- One bar per assistant API response, split into Input / Cache Read /
     Output / Cache Write. Data comes from the Python-built JSON island below
     (numbers only), so it is immune to the CSS-class drift the DOM-scraped
     timeline has to guard against. -->

<script type="application/json" id="token-chart-data">{{ token_chart_json | safe }}</script>

<div class="token-chart-panel" id="token-chart-panel" style="display: none;">
    <div class="token-chart-header">
        <span class="token-chart-title">📊 Token usage</span>
        <div class="token-chart-legend">
            <span class="token-chart-legend-item"><span class="token-chart-swatch token-chart-swatch-input"></span>Input</span>
            <span class="token-chart-legend-item"><span class="token-chart-swatch token-chart-swatch-cache-read"></span>Cache Read</span>
            <span class="token-chart-legend-item"><span class="token-chart-swatch token-chart-swatch-output"></span>Output</span>
            <span class="token-chart-legend-item"><span class="token-chart-swatch token-chart-swatch-cache-write"></span>Cache Write</span>
        </div>
        <div class="token-chart-scale-toggle" role="group" aria-label="Token chart scale">
            <button type="button" data-scale="linear" class="active">Linear</button>
            <button type="button" data-scale="log">Log</button>
        </div>
        <button type="button" class="token-chart-close" id="closeTokenChart" title="Close token chart" aria-label="Close token chart">✕</button>
    </div>
    <div class="token-chart-scroll">
        <svg id="token-chart-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="token-chart-empty">No token usage to chart for this page.</div>
</div>

<script id="token-chart-script">
    // Token-usage chart - inline for self-contained HTML.
    (function () {
        const SVG_NS = 'http://www.w3.org/2000/svg';

        // Layout constants (px).
        const BAR_WIDTH = 16;
        const BAR_GAP = 6;
        const SIDE_PAD = 8;
        const TOP_PAD = 10;
        const CHART_HEIGHT = 150;
        const AXIS_HEIGHT = 20;
        const SLOT = BAR_WIDTH + BAR_GAP;

        // Stacked segment order (bottom → top) with their CSS-var fills.
        const SEGMENTS = [
            { key: 'input', label: 'Input', fill: 'var(--token-input-color)' },
            { key: 'cache_read', label: 'Cache Read', fill: 'var(--token-cache-read-color)' },
            { key: 'output', label: 'Output', fill: 'var(--token-output-color)' },
            { key: 'cache_write', label: 'Cache Write', fill: 'var(--token-cache-write-color)' },
        ];

        let chartData = [];
        let scaleMode = 'linear';

        function parseData() {
            const island = document.getElementById('token-chart-data');
            if (!island) return [];
            try {
                const parsed = JSON.parse(island.textContent || '[]');
                return Array.isArray(parsed) ? parsed : [];
            } catch (err) {
                console.error('Failed to parse token chart data', err);
                return [];
            }
        }

        // Honor the existing 🔗 Sub-assistant filter toggle: when it is off,
        // sidechain bars are hidden (same dimension as the message filter).
        function sidechainVisible() {
            const toggle = document.querySelector('.filter-toggle[data-type="sidechain"]');
            return !toggle || toggle.classList.contains('active');
        }

        function visibleData() {
            const showSidechain = sidechainVisible();
            return chartData.filter(d => showSidechain || !d.sidechain);
        }

        function scaleValue(v) {
            if (v <= 0) return 0;
            return scaleMode === 'log' ? Math.log10(v + 1) : v;
        }

        function shortTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderChart() {
            const svg = document.getElementById('token-chart-svg');
            const empty = document.querySelector('.token-chart-empty');
            if (!svg) return;

            // Clear previous render.
            while (svg.firstChild) svg.removeChild(svg.firstChild);

            const data = visibleData();
            if (data.length === 0) {
                svg.style.display = 'none';
                if (empty) empty.style.display = 'block';
                return;
            }
            svg.style.display = 'block';
            if (empty) empty.style.display = 'none';

            // Max scaled total across visible bars sets the full chart height.
            let maxScaled = 0;
            data.forEach(d => {
                let sum = 0;
                SEGMENTS.forEach(seg => { sum += scaleValue(d[seg.key] || 0); });
                if (sum > maxScaled) maxScaled = sum;
            });
            if (maxScaled <= 0) maxScaled = 1;

            const width = SIDE_PAD * 2 + data.length * SLOT;
            const height = TOP_PAD + CHART_HEIGHT + AXIS_HEIGHT;
            svg.setAttribute('width', String(width));
            svg.setAttribute('height', String(height));
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

            const baseline = TOP_PAD + CHART_HEIGHT;
            // Sparse x-axis labels: aim for roughly 8 ticks.
            const tickEvery = Math.max(1, Math.ceil(data.length / 8));

            data.forEach((d, i) => {
                const x = SIDE_PAD + i * SLOT;
                const group = document.createElementNS(SVG_NS, 'g');
                group.setAttribute('class', 'token-bar');
                group.setAttribute('data-message-id', d.id);

                // Whole-bar tooltip: timestamp + exact counts + total.
                const total = SEGMENTS.reduce((acc, seg) => acc + (d[seg.key] || 0), 0);
                const titleEl = document.createElementNS(SVG_NS, 'title');
                const lines = [];
                if (d.ts) lines.push(shortTime(d.ts));
                SEGMENTS.forEach(seg => {
                    lines.push(`${seg.label}: ${(d[seg.key] || 0).toLocaleString()}`);
                });
                lines.push(`Total: ${total.toLocaleString()}`);
                if (d.sidechain) lines.push('🔗 Sub-assistant');
                titleEl.textContent = lines.join('\n');
                group.appendChild(titleEl);

                let yBottom = baseline;
                SEGMENTS.forEach(seg => {
                    const v = d[seg.key] || 0;
                    const sv = scaleValue(v);
                    const h = (sv / maxScaled) * CHART_HEIGHT;
                    if (h > 0) {
                        const rect = document.createElementNS(SVG_NS, 'rect');
                        rect.setAttribute('x', String(x));
                        rect.setAttribute('y', String(yBottom - h));
                        rect.setAttribute('width', String(BAR_WIDTH));
                        rect.setAttribute('height', String(h));
                        rect.setAttribute('fill', seg.fill);
                        group.appendChild(rect);
                        yBottom -= h;
                    }
                });

                svg.appendChild(group);

                // Sparse time tick under the bar.
                if (i % tickEvery === 0) {
                    const label = shortTime(d.ts);
                    if (label) {
                        const text = document.createElementNS(SVG_NS, 'text');
                        text.setAttribute('x', String(x + BAR_WIDTH / 2));
                        text.setAttribute('y', String(baseline + 14));
                        text.setAttribute('class', 'token-chart-tick');
                        text.setAttribute('text-anchor', 'middle');
                        text.textContent = label;
                        svg.appendChild(text);
                    }
                }
            });
        }

        // Click a bar → scroll to the response message and flash it. The panel
        // is fixed at the BOTTOM, so we only subtract any open top-sticky
        // element (filter toolbar / timeline) and otherwise put the target
        // near the top of the area above the panel.
        function navigateToBar(messageId) {
            if (!messageId) return;
            const messageEl = document.getElementById('msg-' + messageId);
            if (!messageEl) return;

            let topOffset = 0;
            const timeline = document.getElementById('timeline-container');
            if (timeline && timeline.style.display !== 'none') {
                topOffset = Math.max(topOffset, timeline.offsetHeight);
            }
            const filterToolbar = document.querySelector('.filter-toolbar');
            if (filterToolbar && getComputedStyle(filterToolbar).display !== 'none') {
                topOffset = Math.max(topOffset, filterToolbar.offsetHeight);
            }

            const scrollPosition = messageEl.offsetTop - topOffset - 16;
            window.scrollTo({ top: Math.max(0, scrollPosition), behavior: 'smooth' });

            messageEl.style.backgroundColor = '#fff3cd';
            setTimeout(() => {
                messageEl.style.backgroundColor = '';
            }, 2000);
        }

        function setScale(mode) {
            if (mode !== 'linear' && mode !== 'log') return;
            scaleMode = mode;
            document.querySelectorAll('.token-chart-scale-toggle button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.scale === mode);
            });
            renderChart();
        }

        function isOpen() {
            const panel = document.getElementById('token-chart-panel');
            return panel && panel.style.display !== 'none';
        }

        function toggleTokenChart() {
            const panel = document.getElementById('token-chart-panel');
            const button = document.getElementById('toggleTokenChart');
            if (!panel) return;
            if (panel.style.display === 'none') {
                panel.style.display = 'flex';
                if (button) button.classList.add('active');
                renderChart();
            } else {
                panel.style.display = 'none';
                if (button) button.classList.remove('active');
            }
        }

        // Re-render on filter changes so sidechain bars appear/disappear with
        // the 🔗 Sub-assistant toggle (mirrors the timeline's filter wiring).
        function onFilterChange() {
            if (isOpen()) setTimeout(renderChart, 50);
        }

        window.toggleTokenChart = toggleTokenChart;

        document.addEventListener('DOMContentLoaded', function () {
            chartData = parseData();

            const button = document.getElementById('toggleTokenChart');
            if (button) {
                button.addEventListener('click', toggleTokenChart);
            }

            const closeButton = document.getElementById('closeTokenChart');
            if (closeButton) {
                closeButton.addEventListener('click', toggleTokenChart);
            }

            document.querySelectorAll('.token-chart-scale-toggle button').forEach(btn => {
                btn.addEventListener('click', () => setScale(btn.dataset.scale));
            });

            // Event-delegated bar click.
            const svg = document.getElementById('token-chart-svg');
            if (svg) {
                svg.addEventListener('click', function (event) {
                    const bar = event.target.closest('.token-bar');
                    if (bar) navigateToBar(bar.getAttribute('data-message-id'));
                });
            }

            // Filter parity wiring.
            document.querySelectorAll('.filter-toggle').forEach(toggle => {
                toggle.addEventListener('click', onFilterChange);
            });
            const selectAllButton = document.getElementById('selectAll');
            const selectNoneButton = document.getElementById('selectNone');
            if (selectAllButton) selectAllButton.addEventListener('click', onFilterChange);
            if (selectNoneButton) selectNoneButton.addEventListener('click', onFilterChange);
        });
    })();
</script>
